    <!-- Preconnect to font origins for faster delivery -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts with display=swap to prevent FOIT -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
    <!-- Tailwind utility classes (CDN — swap for a PostCSS build for production perf gains) -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <style>
      /* ─── Base fonts ─── */
      body {
        font-family: 'Montserrat', sans-serif;
        --scroll-progress: 0;
      }
      .font-cinzel {
        font-family: 'Cinzel Decorative', cursive;
      }

      /* ─── Typography: prevent mid-word breaks everywhere ─── */
      * {
        hyphens: none;
        -webkit-hyphens: none;
        -moz-hyphens: none;
      }
      h1, h2, h3 {
        text-wrap: balance;
        letter-spacing: -0.015em;
        line-height: 1.15;
      }
      p {
        text-wrap: pretty;
        line-height: 1.75;
      }

      /* ─── Holographic / animated keyword effects ─── */
      .holographic-text {
        background-image: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: holographic-shine 5s linear infinite;
      }
      .keyword-holographic {
        position: relative;
        background-image: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: holographic-shine 4s linear infinite, holographic-glitch 5s infinite;
      }
      @keyframes holographic-shine {
        to { background-position: 200% 0; }
      }
      @keyframes holographic-glitch {
        0%   { text-shadow:  .5px 0 0 #ff00de, -.5px 0 0 #00f6ff; }
        25%  { text-shadow: -.5px 0 0 #ff00de,  .5px 0 0 #00f6ff; }
        50%  { text-shadow:  .5px 0 0 #ff00de, -.5px 0 0 #00f6ff; }
        74%  { text-shadow: none; }
        75%  { text-shadow: -.5px 0 0 #ff00de,  .5px 0 0 #00f6ff; }
        100% { text-shadow:  .5px 0 0 #ff00de, -.5px 0 0 #00f6ff; }
      }

      /* ─── Floating animation ─── */
      @keyframes float {
        0%   { transform: translateY(0px); }
        50%  { transform: translateY(-18px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
        will-change: transform;
      }

      /* ─── Utility ─── */
      .text-balance { text-wrap: balance; }
      .text-pretty  { text-wrap: pretty; }

      /* ─── Reduced-motion override ─── */
      @media (prefers-reduced-motion: reduce) {
        .keyword-holographic,
        .holographic-text,
        .animate-float,
        .animate-pulse,
        [style*="animation"] {
          animation: none !important;
          transition: none !important;
        }
        .keyword-holographic {
          background-image: none;
          color: #c084fc;
        }
      }
    </style>
