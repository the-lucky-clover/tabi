<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You Are Enough, Tabitha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Montserrat', sans-serif;
        --scroll-progress: 0;
      }
      .font-cinzel {
        font-family: 'Cinzel Decorative', cursive;
      }
      /* Custom scrollbar for a more elegant look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a041d;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(to bottom, #ff7e5f, #feb47b, #86a8e7, #7f7fd5);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(to bottom, #ff9e7f, #fec49b, #96b8f7, #8f8fE5);
      }
      /* For text stroke effect */
      .text-stroke {
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.5);
        text-stroke: 1px rgba(255, 255, 255, 0.5);
      }
      .holographic-text {
        background-image: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: holographic-shine 5s linear infinite;
      }
      .keyword-holographic {
        position: relative;
        /* Combines gradient shine with RGB split */
        background-image: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: holographic-shine 4s linear infinite, holographic-glitch 5s infinite;
      }
      @keyframes holographic-shine {
        to {
          background-position: 200% 0;
        }
      }
      @keyframes holographic-glitch {
        0% { text-shadow: .5px 0 0 #ff00de, -.5px 0 0 #00f6ff; }
        25% { text-shadow: -.5px 0 0 #ff00de, .5px 0 0 #00f6ff; }
        50% { text-shadow: .5px 0 0 #ff00de, -.5px 0 0 #00f6ff; }
        74% { text-shadow: none; }
        75% { text-shadow: -.5px 0 0 #ff00de, .5px 0 0 #00f6ff; }
        100% { text-shadow: .5px 0 0 #ff00de, -.5px 0 0 #00f6ff; }
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .text-balance { text-wrap: balance; }
      .text-pretty { text-wrap: pretty; }
    </style>
<script type="importmap">

}
</script>

</head>

</html>
